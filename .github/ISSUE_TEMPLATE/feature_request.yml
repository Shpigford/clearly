name: Feature Request
description: Suggest something new
labels: ["enhancement"]
body:
  - type: checkboxes
    id: platforms
    attributes:
      label: Platform(s) this applies to
      description: Tick every platform where this feature would be useful.
      options:
        - label: macOS
        - label: iOS
        - label: iPadOS

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why?
      description: What problem does this solve or what's your use case?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or examples
      description: Mockups, screenshots from other apps, or anything that helps illustrate the idea.
    validations:
      required: false
